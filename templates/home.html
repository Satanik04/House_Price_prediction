<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House price </title>
    <link rel="stylesheet" href="{{url_for('static',filename='styles.css')}}">
</head>
<body>
    <div class="user-info">
        <p>Hello,{{username}}</p>
        <a href="/logout">
            <button>Logout</button>
        </a>
    </div>
    <div class="container">
        <h2>House Price Prediction</h2>
        <form action="/predict" method="Post">
            <input type="text"name="longitude"placeholder="Enter Longitude">
            <input type="text" name="latitude"placeholder="Enter Latitude">
            <input type="text" name="housing_median_age" placeholder="Enter house age">
            <input type="text" name="total_rooms" placeholder="Enter total rooms in a block">
            <input type="text" name="total_bedrooms" placeholder="Enter total bedrooms in a block">
            <input type="text" name="population" placeholder="Enter total population in a block">
            <input type="text" name="households" placeholder="Enter total household in a block">
            <input type="text" name="median_income" placeholder="Enter income in a block(doller)">
            
            <select name="ocean_proximity">
                <option value="">Enter Nearby location</option>
                <option value="INLAND">Inland</option>
                <option value="ISLAND">Island</option>
                <option value="NEAR_BAY">Near Bay</option>
                <option value="NEAR_OCEAN">Near Ocean</option>
                <option value="ONE_HOUR">Less than One Hour</option>
            </select>
            <button type="submit">Predict</button>
        </form>
        <div class="result">
            <h3>Approx house price is:{{result}}</h3>
        </div>
    </div>
</body>
</html>
